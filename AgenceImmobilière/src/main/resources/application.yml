spring:
  datasource:
    url: jdbc:mysql://localhost:3306/agenceImmobilier?serverTimezone=GMT&createDatabaseIfNotExist=true
    username: root
    password:

  jpa:
    hibernate:
      ddl-auto: update

    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
        show_sql: true
  logging:
    level:
      org:
        hibernate:
          SQL: DEBUG
          type:
            descriptor:
              sql: TRACE
server:
  error:
    include-message: always


  main:
    allow-bean-definition-overriding: true

jwtSecret: xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
jwtExpirationMs: 86400000
app:
  oauth2:
    authorizedRedirectUris:
      - http://localhost:8080/oauth2/redirect
      - myandroidapp://oauth2/redirect
      - myiosapp://oauth2/redirect
security:
  oauth2:
    client:
      registration:
        google:
          client-id: xxxxxxxxxxxxxxxxxxxxx
          client-secret: xxxxxxxxxxxxxxxxxxxxxxxxx
          redirectUri: "{baseUrl}/oauth2/callback/{registrationId}"
          scope:
            - email
            - profile

        github:
          clientId: xxxxxxxxxxxxxxxxxxxxxxxxx
          clientSecret: xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
          redirectUri: "{baseUrl}/oauth2/callback/{registrationId}"
          scope:
            - user:email
            - read:user
flicker:
  apiKey: xxxxxxxxxxxxxxxxxxxxxxxx
  apiSecret: xxxxxxxxxxxxxxxxxxxxxxxxxxxxx
  appKey: xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
  appSecret: xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx

  spring:
    servlet:
      multipart:
        max-file-size: 30MB  # Set the maximum allowed file size to 10MB
        max-request-size: 10MB  # Set the maximum allowed request size to 10MB

  devtools: true
socket:
  host: localhost
  port: 8877